<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ocean Wanderers</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Georgia',serif; touch-action:none; }
  canvas { display:block; }
  #ui {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:10;
  }
  #hud {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:16px; align-items:center;
    background:rgba(0,20,60,0.6); border:1px solid rgba(100,200,255,0.3);
    border-radius:30px; padding:8px 20px; backdrop-filter:blur(8px);
    color:#aef; font-size:13px; letter-spacing:1px;
  }
  #hud .stat { display:flex; align-items:center; gap:6px; }
  #hud .dot { width:8px; height:8px; border-radius:50%; background:#4ff; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  #zone-name {
    position:absolute; top:60px; left:50%; transform:translateX(-50%);
    color:rgba(150,230,255,0.7); font-size:18px; letter-spacing:4px;
    text-transform:uppercase; font-style:italic;
    text-shadow:0 0 20px rgba(100,200,255,0.8);
    transition:opacity 1s;
  }
  #dance-banner {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#fff; font-size:36px; letter-spacing:6px; text-align:center;
    text-shadow:0 0 40px #f0f, 0 0 80px #0ff;
    pointer-events:none; opacity:0; transition:opacity 0.5s;
    font-style:italic; text-transform:uppercase;
  }
  #controls {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; pointer-events:all;
  }
  .ctrl-btn {
    background:rgba(0,40,100,0.7); border:1px solid rgba(100,200,255,0.4);
    border-radius:12px; color:#aef; font-size:11px; padding:6px 12px;
    cursor:pointer; backdrop-filter:blur(6px); letter-spacing:1px;
    transition:all 0.2s; user-select:none;
  }
  .ctrl-btn:hover, .ctrl-btn.active { background:rgba(0,100,200,0.7); border-color:#4ff; color:#fff; }
  #selector {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,5,20,0.92); z-index:100; display:flex;
    flex-direction:column; align-items:center; justify-content:center;
    backdrop-filter:blur(12px);
  }
  #selector h1 {
    color:#aef; font-size:42px; letter-spacing:8px; margin-bottom:8px;
    text-shadow:0 0 40px #4af; text-transform:uppercase;
  }
  #selector p { color:rgba(150,200,255,0.6); margin-bottom:36px; letter-spacing:2px; font-size:14px; }
  #animal-grid {
    display:grid; grid-template-columns:repeat(5,1fr); gap:12px;
    max-width:800px; margin-bottom:28px;
  }
  .animal-card {
    background:rgba(0,30,80,0.8); border:1px solid rgba(80,160,255,0.3);
    border-radius:16px; padding:16px 12px; cursor:pointer; text-align:center;
    transition:all 0.25s; pointer-events:all;
  }
  .animal-card:hover { background:rgba(0,60,140,0.9); border-color:#4ff; transform:scale(1.05); }
  .animal-card .icon { font-size:36px; margin-bottom:6px; }
  .animal-card .name { color:#aef; font-size:11px; letter-spacing:1px; text-transform:uppercase; }
  #ai-mode-btn {
    background:rgba(0,80,60,0.8); border:2px solid rgba(0,255,180,0.5);
    border-radius:20px; color:#0fb; padding:10px 28px; cursor:pointer;
    font-size:14px; letter-spacing:2px; transition:all 0.2s; pointer-events:all;
  }
  #ai-mode-btn:hover { background:rgba(0,140,100,0.9); border-color:#0ff; }
  #joystick-area {
    position:fixed; bottom:80px; left:40px; width:120px; height:120px;
    pointer-events:all; z-index:11;
  }
  #joystick-base {
    width:100%; height:100%; border-radius:50%;
    background:rgba(0,40,100,0.4); border:2px solid rgba(100,200,255,0.3);
    position:relative;
  }
  #joystick-thumb {
    width:44px; height:44px; border-radius:50%;
    background:rgba(80,180,255,0.7); border:2px solid rgba(200,240,255,0.8);
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    transition:none;
  }
  #action-btns {
    position:fixed; bottom:80px; right:40px; display:grid;
    grid-template-columns:1fr 1fr; gap:8px; pointer-events:all; z-index:11;
  }
  .action-btn {
    width:52px; height:52px; border-radius:50%;
    background:rgba(0,40,100,0.6); border:2px solid rgba(100,200,255,0.4);
    color:#aef; font-size:20px; cursor:pointer; display:flex;
    align-items:center; justify-content:center; user-select:none;
    transition:all 0.15s; backdrop-filter:blur(4px);
  }
  .action-btn:active { background:rgba(0,100,200,0.8); transform:scale(0.92); }
  #ui, #joystick-area, #action-btns { transition: opacity 1.5s; }
  .ui-faded { opacity:0 !important; pointer-events:none !important; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="hud">
    <div class="stat"><div class="dot"></div><span id="hud-animal">Clownfish</span></div>
    <div class="stat">🌊 <span id="hud-zone">Coral Reef</span></div>
    <div class="stat">🎭 <span id="hud-mode">Player</span></div>
  </div>
  <div id="zone-name">Coral Reef</div>
  <div id="dance-banner">✨ DANCE PARTY ✨</div>
  <div id="controls">
    <div class="ctrl-btn" id="btn-change">Change Animal</div>
    <div class="ctrl-btn" id="btn-ai">Watch AI</div>
    <div class="ctrl-btn" id="btn-speed">Speed: Normal</div>
  </div>
</div>

<div id="joystick-area" style="display:none">
  <div id="joystick-base">
    <div id="joystick-thumb"></div>
  </div>
</div>
<div id="action-btns" style="display:none">
  <div class="action-btn" id="btn-dash">💨</div>
  <div class="action-btn" id="btn-up">↑</div>
  <div class="action-btn" id="btn-spin">🌀</div>
  <div class="action-btn" id="btn-down">↓</div>
</div>

<div id="selector">
  <h1>Ocean Wanderers</h1>
  <p>Choose your creature · Swim the endless ocean</p>
  <div id="animal-grid"></div>
  <button id="ai-mode-btn">👁 Watch All AI Mode</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─── UI AUTO-HIDE ──────────────────────────────────────────────────────────────
let lastActivity = Date.now();
const uiEls = () => [document.getElementById('ui'), document.getElementById('joystick-area'), document.getElementById('action-btns')];
function onActivity() {
  lastActivity = Date.now();
  if (document.getElementById('selector').style.display === 'none') {
    uiEls().forEach(el => el && el.classList.remove('ui-faded'));
  }
}
['mousemove','mousedown','touchstart','touchmove','keydown'].forEach(ev => window.addEventListener(ev, onActivity, {passive:true}));

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── WORLD CONFIG ─────────────────────────────────────────────────────────────
const WORLD_WIDTH = 20000;
const WORLD_HEIGHT = () => canvas.height;
let camX = 0;

// ─── ATMOSPHERE STATE ─────────────────────────────────────────────────────────
let bgCycleT = 0;         // slowly increments → hue cycling
let neonMode  = false;
let neonTimer = 0;
let neonTriggerT = 10800 + Math.random()*7200; // first neon: 3-5 min
let lastChosenDef = null; // which animal the user last picked

// ─── ZONES ────────────────────────────────────────────────────────────────────
const zones = [
  { name:'Coral Reef',    x:0,     color1:'#001833', color2:'#003366', accent:'#00aaff' },
  { name:'Kelp Forest',  x:4000,  color1:'#001a0d', color2:'#003319', accent:'#33cc66' },
  { name:'Open Ocean',   x:8000,  color1:'#000d1a', color2:'#001433', accent:'#0055ff' },
  { name:'Twilight Zone',x:12000, color1:'#0d000d', color2:'#1a0033', accent:'#9900ff' },
  { name:'Deep Abyss',   x:16000, color1:'#000005', color2:'#050015', accent:'#ff3300' },
];
function getZone(x) {
  const wx = ((x % WORLD_WIDTH) + WORLD_WIDTH) % WORLD_WIDTH;
  for (let i = zones.length-1; i >= 0; i--) {
    if (wx >= zones[i].x) return zones[i];
  }
  return zones[0];
}

// ─── PRE-GENERATED SCENERY ────────────────────────────────────────────────────
const WEED_COLORS = [
  '#ff44cc','#cc44ff','#44ffcc','#ff8833','#44ddff',
  '#ff4477','#aaff44','#ff55ff','#33bbff','#ffdd22',
  '#ff77aa','#66ff88','#7744ff','#ffaa44','#44ffee',
];
const SEAWEED = Array.from({length:130}, (_,i) => ({
  wx: (i*179 + i*i*7 + 300) % WORLD_WIDTH,
  h: 55 + Math.abs(Math.sin(i*0.71))*150,
  color: WEED_COLORS[i % WEED_COLORS.length],
  color2: WEED_COLORS[(i*3+5) % WEED_COLORS.length],
  thick: 2.5 + (i%5),
  wo: i * 0.82,
  lean: Math.sin(i*13)*0.35,
}));

const ANEM_COLS = [
  '#ff44bb','#44ffee','#ff8844','#bb44ff','#ff3355',
  '#44ff99','#ffee44','#ff88ff','#44bbff','#ff6622',
];
const BG_ANEMONES = Array.from({length:75}, (_,i) => ({
  wx: (i*241 + i*i*11 + 180) % WORLD_WIDTH,
  size: 16 + Math.abs(Math.sin(i*0.53))*48,
  c1: ANEM_COLS[i % ANEM_COLS.length],
  c2: ANEM_COLS[(i*2+3) % ANEM_COLS.length],
  t: 7 + (i%15),
  phase: i * 0.66,
  spread: 0.7 + Math.abs(Math.sin(i*0.37))*0.9,
}));

// ─── ROCKS ────────────────────────────────────────────────────────────────────
const ROCK_COLS = ['#7a7a7a','#8a8070','#6a6868','#9a9280','#5a5850','#7a7060','#686060'];
const ROCKS = Array.from({length:100}, (_,i) => ({
  wx: (i*251 + i*i*11 + 80) % WORLD_WIDTH,
  w: 11 + Math.abs(Math.sin(i*0.73))*32,
  h:  7  + Math.abs(Math.sin(i*0.53))*18,
  color: ROCK_COLS[i%7],
  dark:  ROCK_COLS[(i+3)%7].replace(/[89a]/g,'4'),
  mossy: i%5===0,
  pts: 5 + (i%4),
}));

// ─── SHELLS ───────────────────────────────────────────────────────────────────
const SHELL_COLS = ['#f4c068','#e8b8a0','#ddc890','#f0d8c0','#c8a878','#eec8a0','#f8d898'];
const SHELLS = Array.from({length:65}, (_,i) => ({
  wx: (i*197 + i*i*7 + 30) % WORLD_WIDTH,
  type: i%3,
  size: 7 + Math.abs(Math.sin(i*0.63))*14,
  color: SHELL_COLS[i%7],
  angle: Math.sin(i*1.3)*0.6,
}));

// ─── SAND BANDS ───────────────────────────────────────────────────────────────
const SAND_COLS = ['#c8a870','#f0e8c0','#d4aa70','#e0c890','#a89060',
                   '#e8d8a0','#c07840','#b89868','#ddd0a0','#e0c8a0'];
const SAND_BANDS = Array.from({length:30}, (_,i) => ({
  wx: i * (WORLD_WIDTH/30),
  color: SAND_COLS[i%SAND_COLS.length],
}));

// ─── LANDMARKS ────────────────────────────────────────────────────────────────
// Spread evenly — drawFn receives (ctx, y, t) already translated to world x
const LANDMARK_DEFS = [
  { wx:1200,  draw:'chest'   },
  { wx:3200,  draw:'helmet'  },
  { wx:5800,  draw:'wreck'   },
  { wx:9200,  draw:'sponge'  },
  { wx:13400, draw:'ruins'   },
  { wx:17200, draw:'lunar'   },
];

// ─── ANIMAL TEMPLATES ─────────────────────────────────────────────────────────
const ANIMAL_DEFS = [
  { name:'Clownfish',   icon:'🐠', speed:3,   size:22, color:'#ff6600', drawFn:drawClownfish },
  { name:'Blue Tang',   icon:'🐟', speed:4,   size:24, color:'#1166ff', drawFn:drawBlueTang },
  { name:'Sea Turtle',  icon:'🐢', speed:2,   size:50, color:'#33aa55', drawFn:drawTurtle },
  { name:'Octopus',     icon:'🐙', speed:2.5, size:40, color:'#cc44aa', drawFn:drawOctopus },
  { name:'Jellyfish',   icon:'🪼', speed:1.2, size:38, color:'#ee88ff', drawFn:drawJellyfish },
  { name:'Shark',       icon:'🦈', speed:5.5, size:70, color:'#6688aa', drawFn:drawShark },
  { name:'Seahorse',    icon:'🐴', speed:1,   size:30, color:'#ffaa00', drawFn:drawSeahorse },
  { name:'Manta Ray',   icon:'🟣', speed:3.5, size:80, color:'#334466', drawFn:drawMantaRay },
  { name:'Crab',        icon:'🦀', speed:1.5, size:28, color:'#cc2200', drawFn:drawCrab },
  { name:'Dolphin',     icon:'🐬', speed:6,   size:60, color:'#4488bb', drawFn:drawDolphin },
  { name:'Puffer Fish', icon:'🐡', speed:2,   size:30, color:'#ddaa22', drawFn:drawPuffer },
  { name:'Anemone',     icon:'🌺', speed:0.5, size:34, color:'#ff4488', drawFn:drawAnemone },
  { name:'Anglerfish',  icon:'🎣', speed:2,   size:45, color:'#221133', drawFn:drawAnglerfish },
  { name:'Starfish',    icon:'⭐', speed:0.8, size:26, color:'#ff8800', drawFn:drawStarfish },
  { name:'Squid',       icon:'🦑', speed:4,   size:44, color:'#aa66cc', drawFn:drawSquid },
];

// ─── DRAWING FUNCTIONS ────────────────────────────────────────────────────────
function drawClownfish(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  if (flipX) ctx.scale(-1,1);
  // body
  ctx.fillStyle='#ff6622'; ctx.beginPath();
  ctx.ellipse(0,0,size*0.9,size*0.5,0,0,Math.PI*2); ctx.fill();
  // stripes clipped to body shape
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0,0,size*0.9,size*0.5,0,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='#fff';
  for (let i of [-0.3,0.15,0.6]) {
    ctx.fillRect(size*i-3,-size*0.5,5,size);
  }
  ctx.restore();
  // tail
  ctx.fillStyle='#ff6622';
  ctx.beginPath(); ctx.moveTo(size*0.8,0); ctx.lineTo(size*1.3,-size*0.5); ctx.lineTo(size*1.3,size*0.5); ctx.closePath(); ctx.fill();
  // eye
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-size*0.4,-size*0.15,size*0.12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-size*0.42,-size*0.17,size*0.05,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBlueTang(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  if (flipX) ctx.scale(-1,1);
  ctx.fillStyle='#1177ff';
  ctx.beginPath(); ctx.ellipse(0,0,size*0.95,size*0.45,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffee00';
  ctx.beginPath(); ctx.ellipse(size*0.3,0,size*0.15,size*0.4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0044cc';
  ctx.beginPath(); ctx.moveTo(size*0.85,0); ctx.lineTo(size*1.3,-size*0.4); ctx.lineTo(size*1.3,size*0.4); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-size*0.5,-size*0.1,size*0.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-size*0.52,-size*0.12,size*0.04,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawTurtle(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  if (flipX) ctx.scale(-1,1);
  const bob = Math.sin(t*0.05)*3;
  ctx.translate(0,bob);
  // shell
  ctx.fillStyle='#2a7a3a';
  ctx.beginPath(); ctx.ellipse(0,0,size*0.8,size*0.55,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1a4a22'; ctx.lineWidth=1.5;
  for (let i=-1;i<=1;i++) for(let j=-1;j<=1;j++) {
    ctx.beginPath(); ctx.ellipse(i*size*0.22,j*size*0.15,size*0.18,size*0.12,0,0,Math.PI*2); ctx.stroke();
  }
  // head
  ctx.fillStyle='#4aaa5a';
  ctx.beginPath(); ctx.ellipse(-size*0.9,0,size*0.25,size*0.2,0,0,Math.PI*2); ctx.fill();
  // flippers
  ctx.fillStyle='#3a9a4a';
  for (let [fx,fy,ra] of [[0.3,-0.6,-0.4],[0.3,0.6,0.4],[-0.3,-0.6,-0.8],[-0.3,0.6,0.8]]) {
    ctx.save(); ctx.translate(fx*size,fy*size); ctx.rotate(ra);
    ctx.beginPath(); ctx.ellipse(0,0,size*0.35,size*0.12,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-size*1.05,-size*0.07,size*0.06,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawOctopus(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  if (flipX) ctx.scale(-1,1);
  const s = size;
  // tentacles
  for (let i=0;i<8;i++) {
    const a = (i/8)*Math.PI*2;
    const wag = Math.sin(t*0.08+i*0.8)*0.3;
    ctx.strokeStyle='#cc44aa'; ctx.lineWidth=s*0.12;
    ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,s*0.2);
    const cx1 = Math.cos(a+wag)*s*0.6, cy1 = s*0.4+Math.sin(a)*s*0.4;
    const cx2 = Math.cos(a+wag)*s*1.1, cy2 = s*0.5+Math.sin(a)*s*0.9;
    ctx.bezierCurveTo(cx1,cy1,cx2,cy2,Math.cos(a+wag)*s*1.2,s*0.5+Math.sin(a)*s*1.1);
    ctx.stroke();
  }
  // body
  const grad = ctx.createRadialGradient(0,-s*0.1,0,0,-s*0.1,s*0.7);
  grad.addColorStop(0,'#ff66cc'); grad.addColorStop(1,'#882266');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.ellipse(0,-s*0.1,s*0.6,s*0.7,0,0,Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-s*0.22,-s*0.15,s*0.16,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.22,-s*0.15,s*0.16,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#221133';
  ctx.beginPath(); ctx.arc(-s*0.22,-s*0.15,s*0.09,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.22,-s*0.15,s*0.09,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawJellyfish(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  const pulse = 1 + Math.sin(t*0.06)*0.12;
  // tendrils
  for (let i=0;i<12;i++) {
    const ox = (i-5.5)*size*0.1;
    const wave = Math.sin(t*0.05+i*0.7)*size*0.3;
    ctx.strokeStyle=`rgba(238,136,255,0.5)`;
    ctx.lineWidth=1.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(ox,size*0.3);
    ctx.quadraticCurveTo(ox+wave,size*1.0,ox+wave*0.5,size*1.6);
    ctx.stroke();
  }
  // bell
  const grad = ctx.createRadialGradient(0,-size*0.1,0,0,0,size*1.1*pulse);
  grad.addColorStop(0,'rgba(255,180,255,0.85)');
  grad.addColorStop(0.6,'rgba(180,80,220,0.6)');
  grad.addColorStop(1,'rgba(100,0,150,0.1)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.arc(0,0,size*pulse,Math.PI,0); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawShark(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  if (flipX) ctx.scale(-1,1);
  const s = size;
  // body
  ctx.fillStyle='#6688aa';
  ctx.beginPath(); ctx.moveTo(-s,0);
  ctx.bezierCurveTo(-s*0.5,-s*0.25,s*0.5,-s*0.3,s*0.8,0);
  ctx.bezierCurveTo(s*0.5,s*0.2,-s*0.5,s*0.2,-s,0);
  ctx.fill();
  // belly
  ctx.fillStyle='#ddeeff';
  ctx.beginPath(); ctx.ellipse(0,s*0.05,s*0.7,s*0.18,0,0,Math.PI*2); ctx.fill();
  // tail
  ctx.fillStyle='#6688aa';
  ctx.beginPath(); ctx.moveTo(s*0.8,0); ctx.lineTo(s*1.3,-s*0.4); ctx.lineTo(s*1.1,0); ctx.lineTo(s*1.3,s*0.3); ctx.closePath(); ctx.fill();
  // dorsal fin
  ctx.beginPath(); ctx.moveTo(-s*0.1,-s*0.3); ctx.lineTo(s*0.2,-s*0.7); ctx.lineTo(s*0.4,-s*0.3); ctx.closePath(); ctx.fill();
  // pec fin
  ctx.beginPath(); ctx.moveTo(-s*0.1,s*0.1); ctx.lineTo(s*0.1,s*0.45); ctx.lineTo(s*0.4,s*0.15); ctx.closePath(); ctx.fill();
  // eye
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-s*0.65,-s*0.08,s*0.07,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-s*0.67,-s*0.10,s*0.03,0,Math.PI*2); ctx.fill();
  // gill
  ctx.strokeStyle='#445566'; ctx.lineWidth=1;
  for (let g=0;g<3;g++) {
    ctx.beginPath(); ctx.arc(-s*0.3+g*s*0.12,-s*0.05,s*0.15,Math.PI*0.6,Math.PI*1.4); ctx.stroke();
  }
  ctx.restore();
}

function drawSeahorse(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  if (flipX) ctx.scale(-1,1);
  const s = size, sway = Math.sin(t*0.07)*0.15;

  ctx.strokeStyle='#ffaa00'; ctx.lineWidth=s*0.3; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(0,-s*0.9); ctx.quadraticCurveTo(s*0.4,0,0,s*0.5);
  ctx.quadraticCurveTo(-s*0.2,s*0.8,s*0.1,s*0.9);
  ctx.stroke();
  // head
  ctx.fillStyle='#ffcc44';
  ctx.beginPath(); ctx.ellipse(0,-s*0.9,s*0.3,s*0.22,sway*2,0,Math.PI*2); ctx.fill();
  // snout
  ctx.strokeStyle='#ffcc44'; ctx.lineWidth=s*0.14;
  ctx.beginPath(); ctx.moveTo(-s*0.25,-s*0.9); ctx.lineTo(-s*0.65,-s*1.0); ctx.stroke();
  // dorsal fin

  ctx.beginPath(); ctx.ellipse(s*0.35,-s*0.2,s*0.3,s*0.12,-0.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-s*0.05,-s*0.92,s*0.07,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawMantaRay(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  if (flipX) ctx.scale(-1,1);
  const s = size, flap = Math.sin(t*0.04)*0.18;
  // wings
  ctx.fillStyle='#334466';
  ctx.save(); ctx.rotate(-flap);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-s*0.4,-s*0.3,-s*1.1,-s*0.4,-s*1.2,-s*0.05);
  ctx.bezierCurveTo(-s*0.8,s*0.1,-s*0.4,s*0.1,0,0); ctx.fill(); ctx.restore();
  ctx.save(); ctx.rotate(flap);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(s*0.4,-s*0.3,s*1.1,-s*0.4,s*1.2,-s*0.05);
  ctx.bezierCurveTo(s*0.8,s*0.1,s*0.4,s*0.1,0,0); ctx.fill(); ctx.restore();
  // body
  ctx.fillStyle='#445577';
  ctx.beginPath(); ctx.ellipse(0,0,s*0.35,s*0.25,0,0,Math.PI*2); ctx.fill();
  // belly spots
  ctx.fillStyle='rgba(200,220,255,0.4)';
  for (let [bx,by] of [[-s*0.1,s*0.05],[s*0.1,s*0.08],[0,-s*0.05]])
    { ctx.beginPath(); ctx.arc(bx,by,s*0.06,0,Math.PI*2); ctx.fill(); }
  // tail
  ctx.strokeStyle='#334466'; ctx.lineWidth=s*0.06;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(s*0.1,s*0.9); ctx.stroke();
  // cephalic fins
  ctx.fillStyle='#334466';
  ctx.beginPath(); ctx.moveTo(-s*0.2,-s*0.05); ctx.bezierCurveTo(-s*0.3,-s*0.3,-s*0.4,-s*0.4,-s*0.3,-s*0.45);
  ctx.bezierCurveTo(-s*0.2,-s*0.35,-s*0.15,-s*0.15,-s*0.2,-s*0.05); ctx.fill();
  ctx.beginPath(); ctx.moveTo(s*0.2,-s*0.05); ctx.bezierCurveTo(s*0.3,-s*0.3,s*0.4,-s*0.4,s*0.3,-s*0.45);
  ctx.bezierCurveTo(s*0.2,-s*0.35,s*0.15,-s*0.15,s*0.2,-s*0.05); ctx.fill();

}

function drawCrab(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  const s = size, scuttle = Math.sin(t*0.15)*3;
  ctx.translate(scuttle,0);
  // legs
  ctx.strokeStyle='#cc2200'; ctx.lineWidth=s*0.1; ctx.lineCap='round';
  for (let i=0;i<4;i++) {
    const lx = (i-1.5)*s*0.3, ly = s*0.1, wa = Math.sin(t*0.12+i)*0.3;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx-s*0.3+wa*s*0.2,s*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+s*0.3-wa*s*0.2,s*0.5); ctx.stroke();
  }
  // body
  ctx.fillStyle='#dd2200';
  ctx.beginPath(); ctx.ellipse(0,0,s*0.7,s*0.4,0,0,Math.PI*2); ctx.fill();
  // claws
  for (let cx of [-s*0.7, s*0.7]) {
    ctx.fillStyle='#ff3311';
    ctx.beginPath(); ctx.ellipse(cx,0,s*0.22,s*0.14,cx<0?-0.5:0.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#cc2200';
    ctx.beginPath(); ctx.ellipse(cx+(cx<0?-s*0.1:s*0.1),-s*0.1,s*0.12,s*0.08,0,0,Math.PI*2); ctx.fill();
  }
  // eyes
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-s*0.25,-s*0.2,s*0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.25,-s*0.2,s*0.1,0,Math.PI*2); ctx.fill();

function drawDolphin(ctx, x, y, size, angle, t, flipX) {

  // pec fin

  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-s*0.72,-s*0.12,s*0.07,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-s*0.74,-s*0.14,s*0.03,0,Math.PI*2); ctx.fill();

function drawPuffer(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  if (flipX) ctx.scale(-1,1);
  const s = size, puff = 1+Math.sin(t*0.04)*0.08;
  // body
  const grad = ctx.createRadialGradient(-s*0.1,0,0,0,0,s*puff);
  grad.addColorStop(0,'#ffee88'); grad.addColorStop(0.7,'#ddaa22'); grad.addColorStop(1,'#aa7700');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.arc(0,0,s*puff,0,Math.PI*2); ctx.fill();
  // spines
  ctx.strokeStyle='#886600'; ctx.lineWidth=1;
  for (let i=0;i<24;i++) {
    const a=i/24*Math.PI*2, sp = s*puff;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*sp,Math.sin(a)*sp);
    ctx.lineTo(Math.cos(a)*(sp+s*0.18),Math.sin(a)*(sp+s*0.18)); ctx.stroke();
  }
  // tail
  ctx.fillStyle='#ddaa22';
  ctx.beginPath(); ctx.moveTo(s*puff*0.7,0); ctx.lineTo(s*puff+s*0.4,-s*0.35); ctx.lineTo(s*puff+s*0.4,s*0.35); ctx.closePath(); ctx.fill();
  // eye
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-s*0.25,-s*0.15,s*0.14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-s*0.28,-s*0.18,s*0.06,0,Math.PI*2); ctx.fill();
  // mouth
  ctx.strokeStyle='#886600'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(-s*0.55,s*0.1,s*0.1,0,Math.PI); ctx.stroke();

}

function drawAnemone(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  const s = size;
  // base
  ctx.fillStyle='#cc2255';
  ctx.beginPath(); ctx.ellipse(0,s*0.4,s*0.4,s*0.18,0,0,Math.PI*2); ctx.fill();
  // tentacles
  const colors=['#ff4499','#ff66aa','#ee3388','#ff55bb'];
  for (let i=0;i<16;i++) {
    const a = (i/16)*Math.PI*2, base=s*0.25;
    const wave = Math.sin(t*0.04+i*0.7)*s*0.25;
    ctx.strokeStyle=colors[i%4]; ctx.lineWidth=s*0.14; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*base*0.5,Math.sin(a)*base*0.5+s*0.2);
    ctx.quadraticCurveTo(
      Math.cos(a)*base+wave*0.3, Math.sin(a)*base+wave+s*0.0,
      Math.cos(a)*s*0.6+wave*0.5, Math.sin(a)*s*0.4+wave-s*0.2
    ); ctx.stroke();
    ctx.fillStyle=colors[i%4];
    ctx.beginPath();
    ctx.arc(Math.cos(a)*s*0.6+wave*0.5, Math.sin(a)*s*0.4+wave-s*0.2,s*0.09,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawAnglerfish(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  if (flipX) ctx.scale(-1,1);
  const s = size;
  // lure glow
  const lx = -s*1.0, ly = -s*0.8, glow = 0.6+Math.sin(t*0.1)*0.4;
  const glowGrad = ctx.createRadialGradient(lx,ly,0,lx,ly,s*0.4);
  glowGrad.addColorStop(0,`rgba(100,255,100,${glow})`);
  glowGrad.addColorStop(1,'rgba(0,100,0,0)');
  ctx.fillStyle=glowGrad; ctx.beginPath(); ctx.arc(lx,ly,s*0.4,0,Math.PI*2); ctx.fill();
  // lure stem
  ctx.strokeStyle='#113322'; ctx.lineWidth=s*0.08;
  ctx.beginPath(); ctx.moveTo(-s*0.4,-s*0.4); ctx.quadraticCurveTo(-s*0.7,-s*0.5,lx,ly); ctx.stroke();
  // body
  const bg = ctx.createRadialGradient(0,0,0,0,0,s);
  bg.addColorStop(0,'#331144'); bg.addColorStop(1,'#110022');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.ellipse(0,0,s*0.85,s*0.65,0,0,Math.PI*2); ctx.fill();
  // mouth
  ctx.fillStyle='#440022';
  ctx.beginPath(); ctx.moveTo(-s*0.85,0); ctx.lineTo(-s*0.6,-s*0.4); ctx.lineTo(-s*0.2,-s*0.35);
  ctx.lineTo(-s*0.2,s*0.35); ctx.lineTo(-s*0.6,s*0.4); ctx.closePath(); ctx.fill();
  // teeth
  ctx.fillStyle='#eeeedd';
  for (let i=0;i<5;i++) {
    ctx.beginPath(); ctx.moveTo(-s*(0.7-i*0.12),-s*0.32); ctx.lineTo(-s*(0.66-i*0.12),-s*0.48); ctx.lineTo(-s*(0.62-i*0.12),-s*0.32); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-s*(0.7-i*0.12),s*0.32); ctx.lineTo(-s*(0.66-i*0.12),s*0.48); ctx.lineTo(-s*(0.62-i*0.12),s*0.32); ctx.fill();
  }
  // eye
  ctx.fillStyle='#ffff00'; ctx.beginPath(); ctx.arc(s*0.05,-s*0.2,s*0.16,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(s*0.05,-s*0.2,s*0.09,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawStarfish(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(t*0.01);
  const s = size;
  const grad = ctx.createRadialGradient(0,0,0,0,0,s);
  grad.addColorStop(0,'#ffaa44'); grad.addColorStop(1,'#ff6600');
  ctx.fillStyle=grad;
  ctx.beginPath();
  for (let i=0;i<10;i++) {
    const a = (i/10)*Math.PI*2 - Math.PI/2;
    const r = i%2===0 ? s : s*0.42;
    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#cc5500'; ctx.lineWidth=1; ctx.stroke();
  // texture dots
  ctx.fillStyle='rgba(255,180,80,0.6)';
  for (let i=0;i<5;i++) {
    const a=(i/5)*Math.PI*2, r=s*0.55;
    ctx.beginPath(); ctx.arc(Math.cos(a)*r,Math.sin(a)*r,s*0.08,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawSquid(ctx, x, y, size, angle, t, flipX) {
  ctx.save(); ctx.translate(x,y);
  if (flipX) ctx.scale(-1,1);
  const s = size;
  // tentacles
  for (let i=0;i<10;i++) {
    const ox = (i-4.5)*s*0.09;
    const wave = Math.sin(t*0.07+i)*s*0.2;
    const isLong = i===2||i===7;
    ctx.strokeStyle=isLong?'#8844bb':'#aa66cc';
    ctx.lineWidth=isLong?s*0.07:s*0.05; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(ox,s*0.45);
    ctx.quadraticCurveTo(ox+wave*0.5,s*0.8+wave,ox+wave,isLong?s*1.6:s*1.1); ctx.stroke();
    if (isLong) {
      ctx.fillStyle='#dd88ff';
      ctx.beginPath(); ctx.ellipse(ox+wave,s*1.6,s*0.1,s*0.06,0.3,0,Math.PI*2); ctx.fill();
    }
  }
  // mantle
  const mg = ctx.createLinearGradient(-s*0.35,-s,s*0.35,s*0.5);
  mg.addColorStop(0,'#cc88ee'); mg.addColorStop(1,'#6633aa');
  ctx.fillStyle=mg;
  ctx.beginPath(); ctx.moveTo(0,-s*0.9); ctx.bezierCurveTo(s*0.4,-s*0.6,s*0.4,s*0.2,0,s*0.45);
  ctx.bezierCurveTo(-s*0.4,s*0.2,-s*0.4,-s*0.6,0,-s*0.9); ctx.fill();
  // head
  ctx.fillStyle='#bb77dd';
  ctx.beginPath(); ctx.ellipse(0,s*0.2,s*0.3,s*0.25,0,0,Math.PI*2); ctx.fill();
  // fins
  ctx.fillStyle='rgba(180,120,220,0.7)';
  ctx.beginPath(); ctx.moveTo(0,-s*0.6); ctx.lineTo(-s*0.5,-s*0.2); ctx.lineTo(-s*0.2,s*0.0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,-s*0.6); ctx.lineTo(s*0.5,-s*0.2); ctx.lineTo(s*0.2,s*0.0); ctx.closePath(); ctx.fill();
  // eyes
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-s*0.14,s*0.12,s*0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.14,s*0.12,s*0.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#221133'; ctx.beginPath(); ctx.arc(-s*0.14,s*0.12,s*0.06,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.14,s*0.12,s*0.06,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─── ENTITY SYSTEM ────────────────────────────────────────────────────────────
class Entity {
  constructor(def, x, y) {
    this.name = def.name;
    this.icon = def.icon;
    this.speed = def.speed;
    this.size = def.size;
    this.color = def.color;
    this.drawFn = def.drawFn;
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5)*2;
    this.vy = (Math.random()-0.5)*2;
    this.angle = 0;
    this.flipX = false;
    this.aiState = 'wander';
    this.aiTimer = Math.random()*200;
    this.target = null;
    this.dancePhase = 0;
    this.dancing = false;
    this.danceType = 'spin';
    this.spinAngle = 0;
    this.dashCooldown = 0;
    this.isPlayer = false;
    this.particles = [];
    this.scared = false;
    this.scaredTimer = 0;
    this.curiosityTarget = null;
    this.groupTarget = null;
    this.bobOffset = Math.random()*Math.PI*2;
    this.colorCycle = Math.random()*Math.PI*2;
  }

  update(t, dt, allEntities, playerEntity) {
    if (this.isPlayer) return;
    if (this.dancing) { this.updateDance(t); return; }
    this.aiTimer -= dt;
    this.dashCooldown -= dt;
    this.scaredTimer -= dt;

    // Shark scares others
    if (playerEntity && playerEntity.name==='Shark') {
      const dx=this.x-playerEntity.x, dy=this.y-playerEntity.y;
      if (Math.sqrt(dx*dx+dy*dy)<200 && !this.scared) {
        this.scared=true; this.scaredTimer=120;
      }
    }
    // Scared behavior
    if (this.scared && this.scaredTimer>0) {
      const shark = allEntities.find(e=>e.name==='Shark'&&e.isPlayer);
      if (shark) {
        const dx=this.x-shark.x, dy=this.y-shark.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        this.vx += (dx/d)*0.8; this.vy += (dy/d)*0.8;
      }
    } else { this.scared=false; }

    // Per-animal AI
    this.updateAI(t, dt, allEntities, playerEntity);

    // Separation — avoid stacking
    for (const other of allEntities) {
      if (other === this) continue;
      let sdx = this.x - other.x;
      if (sdx > WORLD_WIDTH/2) sdx -= WORLD_WIDTH;
      if (sdx < -WORLD_WIDTH/2) sdx += WORLD_WIDTH;
      const sdy = this.y - other.y;
      const sd = Math.sqrt(sdx*sdx+sdy*sdy)||1;
      const minD = (this.size + other.size) * 1.1;
      if (sd < minD) {
        const f = (minD - sd) / minD * 0.25;
        this.vx += (sdx/sd)*f; this.vy += (sdy/sd)*f;
      }
    }

    // Velocity damping
    const maxV = this.speed * 1.5;
    const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if (spd>maxV) { this.vx=(this.vx/spd)*maxV; this.vy=(this.vy/spd)*maxV; }
    this.vx*=0.96; this.vy*=0.96;

    this.x += this.vx;
    this.y += this.vy;
    this.x = ((this.x%WORLD_WIDTH)+WORLD_WIDTH)%WORLD_WIDTH;
    const H = canvas.height;
    const margin = this.size*2;
    if (this.y<margin) { this.y=margin; this.vy=Math.abs(this.vy); }
    if (this.y>H-margin) { this.y=H-margin; this.vy=-Math.abs(this.vy); }

    if (this.vx < -0.3) this.flipX = false;
    else if (this.vx > 0.3) this.flipX = true;
  }

  updateAI(t, dt, allEntities, playerEntity) {
    const H = canvas.height;
    const floorY = H - this.size*2 - 10;

    // ── helper: world-aware dx ──
    const wdx = (ax, bx) => { let d=ax-bx; if(d>WORLD_WIDTH/2)d-=WORLD_WIDTH; if(d<-WORLD_WIDTH/2)d+=WORLD_WIDTH; return d; };

    // ── per-species hard overrides (no state machine needed for some) ──
    if (this.name==='Dolphin') {
      // ── Init persistent state ──
      if (!this._ds) {
        this._ds = 'east';
        this._dTrav = 0;
        this._breathT = 400 + Math.random()*300;
        this._bubbleT = 600 + Math.random()*900;
        this._playT = 0; this._playTgt = null;
        this._bStep = null; this._bHold = 0;
      }
      const CRUISE = 1.6, EAST_PX = 700, BACK_PX = 105;
      this._breathT -= dt; this._bubbleT -= dt;
      if (this._playT > 0) this._playT -= dt;

      // ── Bubble ring trigger ──
      if (this._bubbleT <= 0) {
        const fwd = this.flipX ? 1 : -1;
        // Emit a ring of small bubbles that form a torus
        const ringR = 6 + Math.random()*5;
        const bx = this.x + fwd*this.size*1.0;
        const by = this.y - this.size*0.08;
        bubbleRings.push({
          x:bx, y:by,
          vx: fwd*3.4, vy:-0.6,
          r:ringR, maxR:26+Math.random()*20,
          alpha:0.9, birth:t,
        });
        this._bubbleT = 900 + Math.random()*1800;
      }

      // ── Breathing interrupt (surfaces for air) ──
      if (this._breathT <= 0 && this._ds !== 'breathe') {
        this._preBState = this._ds;
        this._ds = 'breathe'; this._bStep = 'rising';
        this._breathT = 800 + Math.random()*700;
      }

      switch (this._ds) {
        case 'east': {
          if (this.vx > 0) this._dTrav += this.vx*dt;
          this.vx += (CRUISE - this.vx)*0.045;
          // Gentle casual bob up and down
          this.vy += Math.sin(t*0.033 + this.bobOffset)*0.13;
          // Occasionally veer up, then drift back to mid-water
          const midY = canvas.height*0.42;
          this.vy += (midY - this.y)*0.003;
          // Occasionally play with a nearby fish for a few seconds
          if (this._playT <= 0 && Math.random()<0.0012) {
            const candidates = allEntities.filter(e=>e!==this&&!e.isPlayer&&e.name!=='Shark'&&e.name!=='Dolphin');
            if (candidates.length>0) {
              this._playTgt = candidates[Math.floor(Math.random()*candidates.length)];
              this._playT = this._playTgt.name==='Puffer Fish' ? 3600 : 150+Math.random()*150;
              this._prePState = 'east';
              this._ds = 'play';
            }
          }
          if (this._dTrav >= EAST_PX) { this._dTrav=0; this._ds='turnback'; }
          break;
        }
        case 'turnback': {
          this._dTrav += Math.abs(this.vx)*dt;
          this.vx += (-CRUISE - this.vx)*0.045;
          this.vy += Math.sin(t*0.033 + this.bobOffset)*0.1;
          if (this._dTrav >= BACK_PX) { this._dTrav=0; this._ds='east'; }
          break;
        }
        case 'breathe': {
          const topY = this.size*1.6;
          if (this._bStep==='rising') {
            this.vy += (topY - this.y)*0.04;
            this.vx *= 0.93;
            if (this.y <= topY+12) {
              this._bStep='top'; this._bHold=55;
              // Breath bubble ring (smaller, floats straight up)
              const fwd = this.flipX ? 1 : -1;
              bubbleRings.push({x:this.x+fwd*this.size*0.4, y:this.y, vx:fwd*1.8, vy:-1.8, r:4, maxR:13+Math.random()*8, alpha:0.72, birth:t});
            }
          } else if (this._bStep==='top') {
            this._bHold -= dt;
            this.vx*=0.88; this.vy*=0.88;
            if (this._bHold<=0) this._bStep='descend';
          } else {
            const retY = canvas.height*0.4;
            this.vy += (retY - this.y)*0.04;
            if (Math.abs(this.y-retY)<18) { this._ds=this._preBState||'east'; this._bStep=null; }
          }
          break;
        }
        case 'play': {
          if (!this._playTgt || this._playT<=0) {
            this._playTgt=null; this._dTrav=0; this._ds=this._prePState||'east'; break;
          }
          let dx=this._playTgt.x-this.x;
          if (dx>WORLD_WIDTH/2) dx-=WORLD_WIDTH; if (dx<-WORLD_WIDTH/2) dx+=WORLD_WIDTH;
          const dy=this._playTgt.y-this.y, d=Math.sqrt(dx*dx+dy*dy)||1;
          if (d>this.size*2.5) {
            this.vx+=dx/d*0.16; this.vy+=dy/d*0.11;
          } else {
            // Playfully bobbing near the fish
            this.vy += Math.sin(t*0.07+this.bobOffset)*0.2;
            this.vx *= 0.91;
          }
          break;
        }
      }
      return;
    }

    // ── Watched-entity patrol (non-dolphin AI watch mode) ──
    if (isAIMode && this===aiFollowEntity && this.name!=='Dolphin') {
      if(!this._ws){this._ws='east';this._wt=0;}
      const cs=Math.min(this.speed,2.8)*0.5;
      const ep=400+this.speed*55, bp=65+this.speed*8;
      this._wt+=Math.abs(this.vx);
      if(this._ws==='east'){
        this.vx+=(cs-this.vx)*0.04;
        this.vy+=Math.sin(t*0.033+this.bobOffset)*0.1;
        if(this._wt>=ep){this._wt=0;this._ws='back';}
      } else {
        this.vx+=(-cs-this.vx)*0.04;
        this.vy+=Math.sin(t*0.033+this.bobOffset)*0.08;
        if(this._wt>=bp){this._wt=0;this._ws='east';}
      }
      return;
    }

    if (this.name==='Jellyfish') {
      this.vx *= 0.97;
      this.vy += Math.sin(t*0.03+this.bobOffset)*0.08;
      this.vx += (Math.random()-0.5)*0.08;
      return;
    }
    if (this.name==='Starfish') {
      // Very slow bottom-hugger
      if (this.y < floorY - 5) this.vy += 0.05;
      this.vx += (Math.random()-0.5)*this.speed*0.15;
      this.vx *= 0.97;
      return;
    }
    if (this.name==='Crab') {
      // Scuttles along the floor
      if (this.y < floorY) this.vy += 0.2;
      else { this.y = floorY; this.vy = 0; }
      if (this.aiTimer <= 0) {
        this.aiTimer = 60 + Math.random()*120;
        this.vx = (Math.random()-0.5)*this.speed*2.5;
      } else { this.aiTimer -= dt; }
      this.vx *= 0.92;
      return;
    }
    if (this.name==='Seahorse') {
      // Hovers in place, gentle bob, barely moves horizontally
      this.vy += Math.sin(t*0.045+this.bobOffset)*0.12;
      this.vx *= 0.93;
      if (Math.random()<0.005) this.vx += (Math.random()-0.5)*this.speed*0.6;
      return;
    }
    if (this.name==='Anemone') {
      // Anchored to bottom, just sway (no movement)
      if (this.y < floorY) this.vy += 0.15;
      this.vx *= 0.85; this.vy *= 0.85;
      return;
    }

    // ── state machine for remaining species ──
    if (this.aiTimer <= 0) {
      this.aiTimer = 80 + Math.random()*220;
      const r = Math.random();
      if (this.name==='Shark') {
        this.aiState = 'chase';
        const prey = allEntities.filter(e=>e!==this&&e.name!=='Shark'&&!e.isPlayer);
        if (prey.length>0) this.target = prey[Math.floor(Math.random()*prey.length)];
      } else if (this.name==='Octopus') {
        this.aiState = r<0.5?'bottom_creep':'wander';
      } else if (this.name==='Manta Ray') {
        this.aiState = r<0.4?'sweep':'wander';
        if (!this._sweepDir) this._sweepDir = Math.random()<0.5?1:-1;
      } else if (this.name==='Anglerfish') {
        this.aiState = r<0.6?'lure':'stalk';
      } else if (this.name==='Clownfish') {
        this.aiState = r<0.5?'seek_anemone':'school';
      } else if (this.name==='Squid') {
        this.aiState = r<0.4?'jet':'school';
      } else {
        this.aiState = r<0.45?'wander':r<0.75?'school':'explore';
      }
    } else { this.aiTimer -= dt; }

    switch (this.aiState) {
      case 'wander':
        if (Math.random()<0.025) {
          this.vx += (Math.random()-0.5)*this.speed*0.9;
          this.vy += (Math.random()-0.5)*this.speed*0.5;
        }
        break;

      case 'chase': {
        // Shark chases prey; pick new target if close or gone
        if (!this.target || this.target===this) {
          const prey = allEntities.filter(e=>e!==this&&e.name!=='Shark'&&!e.isPlayer);
          if (prey.length>0) this.target = prey[Math.floor(Math.random()*prey.length)];
        }
        if (this.target) {
          const dx=wdx(this.target.x,this.x), dy=this.target.y-this.y;
          const d=Math.sqrt(dx*dx+dy*dy)||1;
          this.vx+=dx/d*this.speed*0.2; this.vy+=dy/d*this.speed*0.1;
          // Caught — pick new target
          if (d<this.size*1.8) {
            const prey2=allEntities.filter(e=>e!==this&&e.name!=='Shark'&&!e.isPlayer&&e!==this.target);
            this.target=prey2.length>0?prey2[Math.floor(Math.random()*prey2.length)]:null;
          }
        }
        break;
      }

      case 'school': {
        const near=allEntities.filter(e=>e!==this&&e.name===this.name&&Math.abs(wdx(e.x,this.x))<280&&Math.abs(e.y-this.y)<160);
        if (near.length>0) {
          const cx=near.reduce((s,e)=>s+e.x,0)/near.length;
          const cy=near.reduce((s,e)=>s+e.y,0)/near.length;
          const mvx=near.reduce((s,e)=>s+e.vx,0)/near.length;
          const mvy=near.reduce((s,e)=>s+e.vy,0)/near.length;
          const ddx=wdx(cx,this.x);
          this.vx+=ddx*0.003+(mvx-this.vx)*0.04;
          this.vy+=(cy-this.y)*0.003+(mvy-this.vy)*0.04;
        } else { this.aiState='wander'; }
        break;
      }

      case 'seek_anemone': {
        // Clownfish circles nearest Anemone entity
        const anemones=allEntities.filter(e=>e.name==='Anemone');
        if (anemones.length>0) {
          if (!this._homeAnem) this._homeAnem=anemones[Math.floor(Math.random()*anemones.length)];
          const ha=this._homeAnem;
          const dx=wdx(ha.x,this.x), dy=ha.y-this.y;
          const d=Math.sqrt(dx*dx+dy*dy)||1;
          if (d>this.size*4) {
            this.vx+=dx/d*this.speed*0.12; this.vy+=dy/d*this.speed*0.1;
          } else {
            // orbit it
            this.vx+=(-dy/d)*this.speed*0.15;
            this.vy+=(dx/d)*this.speed*0.15;
          }
        } else { this.aiState='school'; }
        break;
      }

      case 'bottom_creep': // Octopus slinks to seafloor, explores rocks
        if (this.y < floorY - 20) this.vy += 0.18;
        this.vx += (Math.random()-0.5)*this.speed*0.6;
        this.vx *= 0.95;
        break;

      case 'sweep': // Manta Ray wide arc
        this._sweepPhase = (this._sweepPhase||0) + 0.012*dt;
        this.vx = Math.cos(this._sweepPhase) * this.speed * (this._sweepDir||1);
        this.vy = Math.sin(this._sweepPhase*0.5) * this.speed * 0.4;
        break;

      case 'jet': // Squid jets backwards
        if (Math.random()<0.01) { this.vx-=this.vx*2; this.vy-=this.speed*1.2; }
        this.vx += (Math.random()-0.5)*this.speed*0.3;
        break;

      case 'explore':
        this.vx += (Math.random()-0.5)*this.speed*0.6;
        this.vy += (Math.random()-0.5)*this.speed*0.35;
        break;

      case 'lure': // Anglerfish — near bottom, barely moves
        if (this.y < floorY - 30) this.vy += 0.1;
        this.vx *= 0.93; this.vy *= 0.93;
        break;

      case 'stalk': {
        // Anglerfish slowly follows nearest fish
        const prey=allEntities.filter(e=>e!==this&&e.name!=='Anglerfish'&&!e.isPlayer);
        if (prey.length>0) {
          if (!this.target||Math.random()<0.01) this.target=prey[Math.floor(Math.random()*prey.length)];
          const dx=wdx(this.target.x,this.x), dy=this.target.y-this.y;
          const d=Math.sqrt(dx*dx+dy*dy)||1;
          if (d>80) { this.vx+=dx/d*this.speed*0.04; this.vy+=dy/d*0.03; }
        }
        break;
      }
    }
  }

  updateDance(t) {
    this.dancePhase += 0.05;
    switch(this.danceType) {
      case 'spin': this.spinAngle += 0.2; this.vx=0; this.vy=0; break;
      case 'wave':
        this.vx = Math.cos(this.dancePhase*2)*this.speed*2;
        this.vy = Math.sin(this.dancePhase)*this.speed;
        break;
      case 'jump':
        this.vy = -Math.sin(this.dancePhase*2)*this.speed*3;
        this.vx += (Math.random()-0.5)*0.5;
        break;
      case 'circle': {
        const cx=canvas.width*0.5+camX, cy=canvas.height*0.5;
        const angle=this.dancePhase+this._danceOffset;
        const r=80+this._danceRadius*40;
        this.x = cx+Math.cos(angle)*r;
        this.y = cy+Math.sin(angle)*r;
        this.vx=0; this.vy=0;
        break;
      }
      case 'burst':
        this.vx = Math.cos(this.dancePhase*3)*this.speed*4;
        this.vy = Math.sin(this.dancePhase*3)*this.speed*4;
        break;
    }
    this.x += this.vx; this.y += this.vy;
    this.x = ((this.x%WORLD_WIDTH)+WORLD_WIDTH)%WORLD_WIDTH;
    const H=canvas.height, m=this.size*2;
    if(this.y<m){this.y=m;} if(this.y>H-m){this.y=H-m;}
  }

  draw(ctx, t) {
    const sx = this.x - camX;
    // wrap draw
    const drawOne = (ox) => {
      ctx.save();
      if (this.dancing && (this.danceType==='spin'||this.danceType==='burst')) {
        ctx.translate(sx+ox, this.y);
        ctx.rotate(this.spinAngle);
        ctx.translate(-(sx+ox), -this.y);
      }
      this.drawFn(ctx, sx+ox, this.y, this.size, this.angle, t, this.flipX);
      ctx.restore();
    };
    drawOne(0);
    if (sx < this.size*2) drawOne(WORLD_WIDTH);
    if (sx > canvas.width-this.size*2) drawOne(-WORLD_WIDTH);
  }
}

// ─── ENTITIES ─────────────────────────────────────────────────────────────────
let entities = [];
let bubbleRings = [];
let playerEntity = null;
let isAIMode = false;
let aiFollowEntity = null;

function spawnEntities() {
  entities = [];
  const H = canvas.height || 800;
  // Spawn multiple of each
  const counts = {
    'Clownfish':4,'Blue Tang':3,'Sea Turtle':2,'Octopus':2,
    'Jellyfish':4,'Shark':1,'Seahorse':3,'Manta Ray':2,'Crab':2,
    'Dolphin':2,'Puffer Fish':3,'Anemone':3,'Anglerfish':2,
    'Starfish':3,'Squid':3
  };
  for (const def of ANIMAL_DEFS) {
    const count = counts[def.name] || 2;
    for (let i=0;i<count;i++) {
      entities.push(new Entity(def, Math.random()*WORLD_WIDTH, 60+Math.random()*(H-120)));
    }
  }
}

// ─── BACKGROUND ───────────────────────────────────────────────────────────────
function drawBackground(t) {
  const W=canvas.width, H=canvas.height;
  const wx = ((camX%WORLD_WIDTH)+WORLD_WIDTH)%WORLD_WIDTH;
  const zone = getZone(wx);

  // ── Color-cycling gradient (slow HSL shift, much brighter) ────────────────
  const hue  = (bgCycleT*0.05) % 360;
  const grad = ctx.createLinearGradient(0,0,0,H);
  const nmDark = neonMode ? 'rgba(0,0,6,0.96)' : null;
  if (neonMode) {
    grad.addColorStop(0, '#000008');
    grad.addColorStop(1, '#000014');
  } else {
    grad.addColorStop(0, `hsl(${hue},72%,18%)`);
    grad.addColorStop(0.6,`hsl(${(hue+25)%360},68%,22%)`);
    grad.addColorStop(1, `hsl(${(hue+45)%360},60%,28%)`);
  }
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // ── Surface light rays ────────────────────────────────────────────────────
  ctx.save();
  const rayAlpha = neonMode ? 0.03 : 0.09;
  ctx.globalAlpha = rayAlpha;
  for(let i=0;i<10;i++){
    const rx=(i*W/9+Math.sin(t*0.008+i)*80)%W;
    const rw=22+Math.sin(t*0.015+i*1.3)*16;
    const rayCol = neonMode ? `hsl(${(hue+i*36)%360},100%,60%)` : zone.accent;
    const rg=ctx.createLinearGradient(rx,0,rx+rw,H);
    rg.addColorStop(0,rayCol); rg.addColorStop(0.5,rayCol); rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg; ctx.fillRect(rx,0,rw,H);
  }
  ctx.restore();

  // ── Bioluminescent rising particles ───────────────────────────────────────
  ctx.save();
  const bioCount = 80;
  for(let i=0;i<bioCount;i++){
    const px=((i*379+camX*0.4)%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH % W;
    const py=((H+H - (i*193 + t*(0.3+i%3*0.15))) % H + H) % H;
    const bioHue=(hue+i*23)%360;
    const bioAlpha=(neonMode?0.55:0.18)+Math.sin(t*0.04+i)*0.1;
    ctx.globalAlpha=Math.max(0,bioAlpha);
    ctx.fillStyle=neonMode?`hsl(${bioHue},100%,65%)`:`rgba(120,220,255,${bioAlpha})`;
    const r=0.8+Math.sin(i*1.7)*0.6;
    if(neonMode){ctx.shadowColor=`hsl(${bioHue},100%,65%)`;ctx.shadowBlur=8;}
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.restore();

  // ── Kelp (zone 2) ─────────────────────────────────────────────────────────
  if(wx>3000&&wx<9000){
    const alpha=Math.min(1,(wx-3000)/500)*Math.min(1,(9000-wx)/500);
    ctx.save(); ctx.globalAlpha=alpha*0.7;
    for(let k=0;k<30;k++){
      const kx=((k*600+1000)-camX%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH;
      if(kx<-60||kx>W+60) continue;
      const kh=H*0.4+Math.sin(k*37)*H*0.2;
      ctx.strokeStyle=neonMode?`hsl(${(k*40)%360},100%,55%)`:'#1a5c2a';
      ctx.lineWidth=6; ctx.lineCap='round';
      if(neonMode){ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=12;}
      ctx.beginPath();
      for(let y=H;y>H-kh;y-=15){const wave=Math.sin(t*0.03+y*0.02+k)*18;y===H?ctx.moveTo(kx,y):ctx.lineTo(kx+wave,y);}
      ctx.stroke(); ctx.shadowBlur=0;
    }
    ctx.restore();
  }

  // ── Coral (zone 1) ────────────────────────────────────────────────────────
  if(wx<5000){
    const alpha=Math.min(1,(5000-wx)/1000);
    ctx.save(); ctx.globalAlpha=alpha*0.85;
    const coralCols=['#ff4488','#ff8822','#44ddff','#ffdd44','#ff44aa'];
    for(let c=0;c<20;c++){
      const cx=((c*800+200)-camX%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH;
      if(cx<-80||cx>W+80) continue;
      ctx.fillStyle=ctx.strokeStyle=coralCols[c%5];
      if(neonMode){ctx.shadowColor=coralCols[c%5];ctx.shadowBlur=14;}
      drawCoralBranch(ctx,cx,H,40+Math.sin(c*17)*30,0,3);
      ctx.shadowBlur=0;
    }
    ctx.restore();
  }

  // ── Abyss glow (zone 5) ───────────────────────────────────────────────────
  if(wx>15000){
    const alpha=Math.min(1,(wx-15000)/1000);
    ctx.save(); ctx.globalAlpha=alpha*0.35;
    for(let i=0;i<5;i++){
      const gx=((i*900+500)-camX%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH;
      const gg=ctx.createRadialGradient(gx,H*0.7+i*20,0,gx,H*0.7+i*20,130);
      gg.addColorStop(0,'rgba(255,80,0,0.6)'); gg.addColorStop(1,'transparent');
      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(gx,H*0.7+i*20,130,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // ── Varied sand seafloor ──────────────────────────────────────────────────
  // First draw a sand-colored floor strip with colour bands
  ctx.save();
  ctx.beginPath(); ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=40){
    const fx=x+camX;
    ctx.lineTo(x, H-14-Math.sin(fx*0.005)*8-Math.sin(fx*0.021)*5);
  }
  ctx.lineTo(W,H); ctx.closePath();
  // Blend sand color based on world position
  const sb0=Math.floor(((camX+0)%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH/(WORLD_WIDTH/SAND_BANDS.length));
  const sb1=(sb0+1)%SAND_BANDS.length;
  const sbf=((camX%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH%(WORLD_WIDTH/SAND_BANDS.length))/(WORLD_WIDTH/SAND_BANDS.length);
  const sandGrad=ctx.createLinearGradient(0,H-30,0,H);
  sandGrad.addColorStop(0, SAND_BANDS[sb0].color);
  sandGrad.addColorStop(1, SAND_BANDS[sb1].color);
  ctx.fillStyle=sandGrad;
  if(neonMode){ctx.globalAlpha=0.15;}
  ctx.fill(); ctx.restore();

  // Sand ripple texture
  if(!neonMode){
    ctx.save(); ctx.globalAlpha=0.12; ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1;
    for(let i=0;i<20;i++){
      const fx=(i*W/19+camX*0.1)%W;
      ctx.beginPath(); ctx.moveTo(fx,H-12); ctx.quadraticCurveTo(fx+W/40,H-18,fx+W/20,H-12); ctx.stroke();
    }
    ctx.restore();
  }

  // ── Rocks on floor ────────────────────────────────────────────────────────
  ctx.save();
  if(neonMode){ctx.shadowBlur=10;}
  drawFloorRocks(ctx, W, H, t);
  ctx.restore();

  // ── Shells on floor ───────────────────────────────────────────────────────
  ctx.save();
  if(neonMode){ctx.globalAlpha=0.6;}
  drawFloorShells(ctx, W, H);
  ctx.restore();

  // ── Landmark decorations ──────────────────────────────────────────────────
  for(const def of LANDMARK_DEFS){
    const sx=((def.wx-camX)%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH;
    if(sx<-250||sx>W+250) continue;
    const floorY=H-14-Math.sin((def.wx)*0.005)*8;
    if(neonMode){ctx.save();ctx.shadowColor=`hsl(${(def.wx*0.02)%360},100%,60%)`;ctx.shadowBlur=22;}
    drawLandmark(ctx, def, sx, floorY, t);
    if(neonMode){ctx.restore();}
  }

  // ── Colorful seaweed ──────────────────────────────────────────────────────
  for(const sw of SEAWEED){
    const sx=((sw.wx-camX)%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH;
    if(sx<-60||sx>W+60) continue;
    const baseY=H-8;
    ctx.save();
    ctx.lineWidth=sw.thick; ctx.lineCap='round';
    const nColor=`hsl(${(sw.wo*40)%360},100%,60%)`;
    for(let strand=0;strand<2;strand++){
      const so=strand*0.4;
      ctx.strokeStyle=neonMode?nColor:(strand===0?sw.color:sw.color2);
      ctx.globalAlpha=neonMode?0.95:0.82;
      if(neonMode){ctx.shadowColor=nColor;ctx.shadowBlur=14;}
      ctx.beginPath();
      for(let s=0;s<=9;s++){
        const frac=s/9;
        const py=baseY-sw.h*frac;
        const px=sx+sw.lean*sw.h*frac*0.6+Math.sin(t*0.028+sw.wo+so+frac*3.2)*16*frac;
        s===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
      }
      ctx.stroke(); ctx.shadowBlur=0;
    }
    const tipX=sx+sw.lean*sw.h*0.6+Math.sin(t*0.028+sw.wo+3.2)*16;
    ctx.globalAlpha=0.9; ctx.fillStyle=neonMode?nColor:sw.color;
    ctx.beginPath(); ctx.ellipse(tipX,baseY-sw.h,sw.thick*2.2,sw.thick*3.5,sw.lean,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── Background anemones ───────────────────────────────────────────────────
  for(const an of BG_ANEMONES){
    const ax=((an.wx-camX)%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH;
    if(ax<-80||ax>W+80) continue;
    const ay=H-8;
    ctx.save(); ctx.globalAlpha=neonMode?0.95:0.88;
    ctx.fillStyle=an.c2; ctx.beginPath(); ctx.ellipse(ax,ay,an.size*0.38,an.size*0.14,0,0,Math.PI*2); ctx.fill();
    for(let i=0;i<an.t;i++){
      const frac=i/(an.t-1||1);
      const a=(frac-0.5)*Math.PI*an.spread;
      const wave=Math.sin(t*0.033+an.phase+i*0.52)*an.size*0.22;
      const c=i%2===0?an.c1:an.c2;
      ctx.strokeStyle=c; ctx.lineWidth=an.size*0.1; ctx.lineCap='round';
      if(neonMode){ctx.shadowColor=c;ctx.shadowBlur=12;}
      ctx.beginPath(); ctx.moveTo(ax,ay);
      const mx=ax+Math.sin(a)*an.size*0.7+wave, my=ay-Math.cos(a)*an.size*0.85;
      ctx.quadraticCurveTo(ax+Math.sin(a)*an.size*0.35+wave*0.5,ay-an.size*0.35,mx,my); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle=i%2===0?an.c2:an.c1;
      ctx.beginPath(); ctx.arc(mx,my,an.size*0.09,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // ── Neon blacklight overlay (drawn last, on top of everything bg) ─────────
  if(neonMode){
    ctx.save(); ctx.globalAlpha=0.72;
    ctx.fillStyle='rgba(0,0,8,0.72)'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

function drawCoralBranch(ctx, x, y, h, angle, depth) {
  if (depth<=0||h<8) return;
  ctx.beginPath();
  ctx.moveTo(x,y);
  const ex=x+Math.sin(angle)*h, ey=y-Math.cos(angle)*h;
  ctx.lineTo(ex,ey); ctx.lineWidth=depth*2; ctx.stroke();
  drawCoralBranch(ctx,ex,ey,h*0.65,angle-0.5,depth-1);
  drawCoralBranch(ctx,ex,ey,h*0.65,angle+0.5,depth-1);
  if (depth===1) { ctx.beginPath(); ctx.arc(ex,ey,4,0,Math.PI*2); ctx.fill(); }
}

// ─── LANDMARK DRAWING FUNCTIONS ───────────────────────────────────────────────
function drawTreasureChest(ctx, x, y, t) {
  const open = Math.max(0, Math.sin(t*0.016)*0.5+0.5);
  ctx.save(); ctx.translate(x, y);
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.beginPath(); ctx.ellipse(0,8,38,9,0,0,Math.PI*2); ctx.fill();
  // scattered coins
  for(let i=0;i<9;i++){
    const cx=Math.sin(i*2.7)*42, cy=Math.cos(i*1.9)*7+10;
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.ellipse(cx,cy,6,3,Math.sin(i)*0.6,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#aa8800'; ctx.lineWidth=0.8; ctx.stroke();
  }
  // box body
  ctx.fillStyle='#7a4a20'; ctx.fillRect(-28,-16,56,26);
  ctx.fillStyle='#5a3010'; ctx.fillRect(-28,-16,56,7);
  // metal bands
  ctx.strokeStyle='#cc9900'; ctx.lineWidth=3;
  for(let bx of[-9,9]){ctx.beginPath();ctx.moveTo(bx,-16);ctx.lineTo(bx,10);ctx.stroke();}
  ctx.beginPath(); ctx.moveTo(-28,-5); ctx.lineTo(28,-5); ctx.stroke();
  // lid
  ctx.save(); ctx.translate(0,-16); ctx.rotate(-open*Math.PI*0.55);
  ctx.fillStyle='#6a3818'; ctx.beginPath(); ctx.ellipse(0,0,28,11,0,Math.PI,0,false); ctx.fill();
  ctx.strokeStyle='#cc9900'; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(0,0,28,11,0,Math.PI,0,false); ctx.stroke();
  ctx.fillStyle='#ffdd00'; ctx.beginPath(); ctx.arc(0,3,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // bubbles when open
  if(open>0.25){
    for(let i=0;i<5;i++){
      const age=(t*0.55+i*22)%75, ba=Math.max(0,1-age/75)*open;
      ctx.save(); ctx.globalAlpha=ba;
      ctx.strokeStyle='rgba(160,225,255,0.9)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(Math.sin(t*0.06+i*1.3)*9,-22-age*0.85,3+i*0.8,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawShipwreck(ctx, x, y, t) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(-0.24);
  const hg=ctx.createLinearGradient(0,-65,0,12); hg.addColorStop(0,'#3a2010'); hg.addColorStop(1,'#1a0c06');
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.moveTo(-95,12); ctx.bezierCurveTo(-95,-22,-52,-65,0,-65); ctx.bezierCurveTo(52,-65,95,-22,95,12); ctx.closePath(); ctx.fill();
  // planks
  ctx.strokeStyle='#2a1408'; ctx.lineWidth=4;
  for(let px=-72;px<=72;px+=22){ctx.beginPath();ctx.moveTo(px,12);ctx.lineTo(px,-52+Math.cos(px/95*Math.PI)*16);ctx.stroke();}
  // waterline
  ctx.strokeStyle='#5a3820'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-95,2); ctx.bezierCurveTo(-50,-4,50,-4,95,2); ctx.stroke();
  // mast stump
  ctx.fillStyle='#6a4020'; ctx.fillRect(-6,-65,12,-42);
  // torn sail
  const sw=Math.sin(t*0.022)*11;
  ctx.fillStyle='rgba(175,155,108,0.45)'; ctx.beginPath(); ctx.moveTo(0,-105); ctx.lineTo(58+sw,-74); ctx.lineTo(47+sw,-57); ctx.lineTo(0,-57); ctx.closePath(); ctx.fill();
  // portholes
  for(let px of[-45,0,45]){
    ctx.fillStyle='#0a0806'; ctx.beginPath(); ctx.arc(px,-26,9,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#7a5030'; ctx.lineWidth=2; ctx.stroke();
    if(Math.sin(t*0.025+px*0.1)>0.5){ctx.fillStyle='rgba(255,185,80,0.22)';ctx.beginPath();ctx.arc(px,-26,8,0,Math.PI*2);ctx.fill();}
  }
  // barnacles
  ctx.fillStyle='rgba(40,80,30,0.38)';
  for(let i=0;i<13;i++){ctx.beginPath();ctx.arc(-88+i*15,8+Math.sin(i*1.3)*4,4+Math.sin(i*2.1)*2,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

function drawPineappleHouse(ctx, x, y, t) {
  ctx.save(); ctx.translate(x,y);
  // body
  ctx.fillStyle='#f0c030'; ctx.beginPath(); ctx.ellipse(0,-58,46,68,0,0,Math.PI*2); ctx.fill();
  // diamond texture
  ctx.strokeStyle='#c08000'; ctx.lineWidth=1.5;
  for(let di=-3;di<=3;di++) for(let dj=-5;dj<=0;dj++){
    const dx=di*15+(dj%2?7:0), dy=dj*16-55;
    if(Math.hypot(dx/46,dy/68)<0.92){ctx.beginPath();ctx.moveTo(dx,dy-7);ctx.lineTo(dx+7,dy);ctx.lineTo(dx,dy+7);ctx.lineTo(dx-7,dy);ctx.closePath();ctx.stroke();}
  }
  // door
  ctx.fillStyle='#4a2800'; ctx.beginPath(); ctx.arc(0,-16,13,Math.PI,0); ctx.rect(-13,-16,26,20); ctx.fill();
  ctx.strokeStyle='#6a4800'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,-16,13,Math.PI,0); ctx.stroke();
  ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(8,-10,2.5,0,Math.PI*2); ctx.fill();
  // windows
  for(let [wx2,wy] of[[-22,-62],[22,-62],[-23,-40],[23,-40]]){
    ctx.fillStyle='rgba(130,225,255,0.65)'; ctx.beginPath(); ctx.arc(wx2,wy,7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c08000'; ctx.lineWidth=2; ctx.stroke();
  }
  // crown leaves
  const ls=Math.sin(t*0.018)*0.09;
  for(let i=0;i<9;i++){
    const a=(i/9)*Math.PI*2-Math.PI/2;
    ctx.save(); ctx.translate(Math.cos(a)*19,Math.sin(a)*13-118); ctx.rotate(a+ls);
    ctx.fillStyle=i%2?'#44bb22':'#33aa11'; ctx.beginPath(); ctx.ellipse(0,-14,5,19,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle='#66cc33'; ctx.beginPath(); ctx.ellipse(0,-122,7,12,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawGreekRuins(ctx, x, y, t) {
  const stone='#c8c0a8', dark='#9a9280';
  ctx.save(); ctx.translate(x,y);
  function col(cx,h,lean=0,broken=false){
    ctx.save(); ctx.translate(cx,0); ctx.rotate(lean);
    ctx.fillStyle=dark; ctx.fillRect(-14,4,28,10);
    const sh=broken?h*0.55:h;
    ctx.fillStyle=stone; ctx.fillRect(-10,-sh,20,sh);
    ctx.strokeStyle=dark; ctx.lineWidth=1.2;
    for(let i=-7;i<=7;i+=3.5){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,-sh);ctx.stroke();}
    if(!broken){ctx.fillStyle=dark;ctx.fillRect(-16,-sh-8,32,8);}
    else{ctx.save();ctx.translate(-5,-sh);ctx.rotate(0.45);ctx.fillStyle=stone;ctx.fillRect(0,-12,18,12);ctx.restore();}
    ctx.restore();
  }
  col(-78,88); col(-40,88); col(40,88,0.05); col(80,88,0,true);
  ctx.fillStyle=dark; ctx.fillRect(-94,-90,70,10);
  // fallen column section
  ctx.save(); ctx.translate(18,-4); ctx.rotate(-Math.PI/2);
  ctx.fillStyle=stone; ctx.fillRect(0,-10,52,20);
  ctx.strokeStyle=dark; ctx.lineWidth=1;
  for(let i=0;i<52;i+=4){ctx.beginPath();ctx.moveTo(i,-10);ctx.lineTo(i,10);ctx.stroke();}
  ctx.restore();
  // ground stones
  for(let [sx,sw,sh2] of[[-105,16,10],[108,20,12],[122,12,8],[135,14,9],[-98,10,7]]){
    ctx.fillStyle=stone; ctx.beginPath(); ctx.ellipse(sx,-2,sw,sh2,0,0,Math.PI*2); ctx.fill();
  }
  // some moss
  ctx.fillStyle='rgba(50,100,35,0.3)';
  for(let [mx,my] of[[-78,-20],[-40,-30],[40,-25],[18,-4]]){ctx.beginPath();ctx.arc(mx,my,8,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

function drawLunarLanding(ctx, x, y, t) {
  ctx.save(); ctx.translate(x,y);

  ctx.fillStyle='rgba(210,205,185,0.1)'; ctx.beginPath(); ctx.ellipse(10,8,140,18,0,0,Math.PI*2); ctx.fill();
  // footprints
  for(let i=0;i<6;i++){ctx.fillStyle='rgba(178,172,150,0.45)';ctx.beginPath();ctx.ellipse(65+i*13,4,4,6,i%2?0.2:-0.2,0,Math.PI*2);ctx.fill();}
  // flag pole
  ctx.strokeStyle='#aaaaaa'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-72,8); ctx.lineTo(-72,-42); ctx.stroke();
  ctx.fillStyle='#cc2222'; ctx.fillRect(-71,-42,28,15);
  ctx.fillStyle='#ffffff'; for(let si=0;si<3;si++){ctx.fillRect(-71,-42+si*4,28,2);}
  ctx.fillStyle='#223388'; ctx.fillRect(-71,-42,12,7);
  // descent stage
  ctx.fillStyle='#c8c8a8'; ctx.fillRect(-30,-32,60,20);
  ctx.fillStyle='#b0b090'; for(let bx=-20;bx<=20;bx+=10){ctx.fillRect(bx,-32,3,20);}
  // legs
  ctx.strokeStyle='#888868'; ctx.lineWidth=4; ctx.lineCap='round';
  for(let [lx1,ly1,lx2,ly2] of[[-30,-18,-58,8],[30,-18,58,8],[-30,-22,-52,8],[30,-22,52,8]]){
    ctx.beginPath(); ctx.moveTo(lx1,ly1); ctx.lineTo(lx2,ly2); ctx.stroke();
  }
  // footpads
  for(let fx of[-62,62]){ctx.fillStyle='#888868';ctx.beginPath();ctx.ellipse(fx,8,11,4,0,0,Math.PI*2);ctx.fill();}
  // ascent stage
  ctx.fillStyle='#d8d8b8'; ctx.fillRect(-22,-62,44,32);
  // window
  ctx.fillStyle='rgba(100,205,255,0.7)'; ctx.beginPath(); ctx.arc(0,-50,10,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#888868'; ctx.lineWidth=2; ctx.stroke();
  // antenna
  ctx.strokeStyle='#bbbbbb'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(18,-62); ctx.lineTo(25,-83); ctx.stroke();
  ctx.beginPath(); ctx.arc(25,-83,3,0,Math.PI*2); ctx.stroke();
  // engine bell + glow
  ctx.fillStyle='#888868'; ctx.beginPath(); ctx.moveTo(-12,-12); ctx.lineTo(-15,-4); ctx.lineTo(15,-4); ctx.lineTo(12,-12); ctx.closePath(); ctx.fill();
  ctx.save(); ctx.globalAlpha=0.28+Math.sin(t*0.03)*0.1;
  const eg=ctx.createRadialGradient(0,-3,0,0,-3,14); eg.addColorStop(0,'rgba(140,200,255,0.45)'); eg.addColorStop(1,'transparent');
  ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(0,-3,14,0,Math.PI*2); ctx.fill(); ctx.restore();
  // astronaut
  const af=Math.sin(t*0.025)*4;
  ctx.save(); ctx.translate(54,-2+af);
  ctx.fillStyle='#eeeeee'; ctx.beginPath(); ctx.roundRect(-9,-28,18,24,4); ctx.fill();
  ctx.beginPath(); ctx.arc(0,-32,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(200,155,40,0.78)'; ctx.beginPath(); ctx.arc(0,-32,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#dddddd'; ctx.fillRect(-7,-4,6,16); ctx.fillRect(1,-4,6,16);
  ctx.fillStyle='#aaaaaa'; ctx.fillRect(-8,12,8,5); ctx.fillRect(0,12,8,5);
  ctx.restore();
  ctx.restore();
}

function drawDiverHelmet(ctx, x, y, t) {
  ctx.save(); ctx.translate(x,y);
  // anchor (offset to side)
  ctx.save(); ctx.translate(62,0);
  ctx.strokeStyle='#6a6060'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-38); ctx.lineTo(0,6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-16,-32); ctx.lineTo(16,-32); ctx.stroke();
  for(let ax of[-13,13]){ctx.beginPath();ctx.moveTo(ax,6);ctx.arc(ax,6,8,0,Math.PI,ax<0);ctx.stroke();}
  ctx.strokeStyle='#4a4040'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,-32,6,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  // helmet
  const hg=ctx.createRadialGradient(-10,-18,0,0,-12,36); hg.addColorStop(0,'#c4a244'); hg.addColorStop(1,'#7a6020');
  ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(0,-12,34,0,Math.PI*2); ctx.fill();
  // neck collar
  ctx.fillStyle='#8a7030'; ctx.beginPath(); ctx.ellipse(0,18,27,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#6a5020'; ctx.fillRect(-25,12,50,8);
  // viewport
  ctx.fillStyle='rgba(80,165,210,0.62)'; ctx.beginPath(); ctx.ellipse(-5,-14,17,15,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#9a7a30'; ctx.lineWidth=3; ctx.stroke();
  // viewport grid
  ctx.strokeStyle='rgba(100,185,225,0.38)'; ctx.lineWidth=1;
  for(let g=-10;g<=10;g+=5){ctx.beginPath();ctx.moveTo(-5+g,-27);ctx.lineTo(-5+g,-1);ctx.stroke();}
  ctx.beginPath(); ctx.moveTo(-20,-14); ctx.lineTo(10,-14); ctx.stroke();
  // bolts
  ctx.fillStyle='#aa8830';
  for(let [bx,by2] of[[-26,-24],[26,-24],[0,24],[-21,1],[21,1]]){ctx.beginPath();ctx.arc(bx,by2,3,0,Math.PI*2);ctx.fill();}
  // air hose
  ctx.strokeStyle='#8a7030'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(34,-10); ctx.bezierCurveTo(52,-22,62,-12,72,-30+Math.sin(t*0.02)*5); ctx.stroke();
  ctx.restore();
}

function drawFloorRocks(ctx, W, H, t) {
  for(const r of ROCKS){
    const sx=((r.wx-camX)%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH;
    if(sx<-70||sx>W+70) continue;
    const ry=H-10-r.h*0.45;
    ctx.fillStyle=r.color;
    ctx.beginPath();
    for(let i=0;i<r.pts;i++){
      const a=(i/r.pts)*Math.PI*2;
      const jit=0.68+Math.sin(i*2.3+r.wx*0.01)*0.32;
      const px=sx+Math.cos(a)*r.w*jit, py=ry+Math.sin(a)*r.h*jit;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=r.dark; ctx.lineWidth=1; ctx.stroke();
    if(r.mossy){
      ctx.fillStyle='rgba(40,85,30,0.32)';
      for(let mi=0;mi<4;mi++){const ma=(mi/4)*Math.PI*1.5;ctx.beginPath();ctx.arc(sx+Math.cos(ma)*r.w*0.55,ry-r.h*0.4+Math.sin(ma)*r.h*0.4,r.w*0.18,0,Math.PI*2);ctx.fill();}
    }
  }
}

function drawFloorShells(ctx, W, H) {
  for(const s of SHELLS){
    const sx=((s.wx-camX)%WORLD_WIDTH+WORLD_WIDTH)%WORLD_WIDTH;
    if(sx<-50||sx>W+50) continue;
    const sy=H-10;
    ctx.save(); ctx.translate(sx,sy); ctx.rotate(s.angle);
    if(s.type===0){ // conch
      ctx.fillStyle=s.color;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(s.size,-1,s.size,-s.size*1.4,-s.size*0.2,-s.size*1.7);
      ctx.bezierCurveTo(-s.size*0.5,-s.size*1.4,-s.size*0.5,-s.size*0.5,0,0); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.8;
      for(let sp=0.3;sp<=1;sp+=0.3){ctx.beginPath();ctx.arc(0,-s.size*sp*1.1,s.size*sp*0.4,0,Math.PI*1.4);ctx.stroke();}
    } else if(s.type===1){ // clam
      ctx.fillStyle=s.color;
      ctx.beginPath(); ctx.ellipse(0,-2,s.size*1.1,s.size*0.72,0,Math.PI,0,false); ctx.fill();
      ctx.beginPath(); ctx.ellipse(0,-2,s.size*1.1,s.size*0.62,0,0,Math.PI,false); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=0.8;
      for(let ri=0;ri<5;ri++){const ra=(ri/4)*Math.PI*0.8-Math.PI*0.4;ctx.beginPath();ctx.moveTo(0,-2);ctx.lineTo(Math.cos(ra-Math.PI/2)*s.size*1.1,Math.sin(ra-Math.PI/2)*s.size*0.72-2);ctx.stroke();}
    } else { // small nautilus spiral
      ctx.beginPath();
      for(let a=0;a<Math.PI*3.5;a+=0.12){const r=s.size*0.1*Math.exp(0.22*a);a===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
      ctx.strokeStyle=s.color; ctx.lineWidth=s.size*0.14; ctx.lineCap='round'; ctx.stroke();
    }
    ctx.restore();
  }
}

function drawLandmark(ctx, def, screenX, floorY, t) {
  switch(def.draw){
    case 'chest':  drawTreasureChest(ctx, screenX, floorY-10, t); break;
    case 'helmet': drawDiverHelmet(ctx, screenX, floorY-22, t);   break;
    case 'wreck':  drawShipwreck(ctx, screenX, floorY-8, t);      break;
    case 'sponge': drawPineappleHouse(ctx, screenX, floorY+8, t); break;
    case 'ruins':  drawGreekRuins(ctx, screenX, floorY-5, t);     break;
    case 'lunar':  drawLunarLanding(ctx, screenX, floorY-5, t);   break;
  }
}

// ─── DANCE PARTY ──────────────────────────────────────────────────────────────
let danceActive = false;
let danceTimer = 90*60; // 90s
const danceTypes = ['spin','wave','jump','circle','burst'];

function triggerDance() {
  danceActive = true;
  danceTimer = 90*60;
  const banner = document.getElementById('dance-banner');
  const danceNames=['🎉 Dance Party!','🌊 Wave Dance!','⭐ Spin Cycle!','🌀 Vortex Time!','💫 Bubble Rave!'];
  banner.textContent = danceNames[Math.floor(Math.random()*danceNames.length)];
  banner.style.opacity='1';
  setTimeout(()=>banner.style.opacity='0',3000);

  const visible = entities.filter(e=>!e.isPlayer&&Math.abs(e.x-camX-canvas.width/2)<canvas.width);
  const type = danceTypes[Math.floor(Math.random()*danceTypes.length)];
  visible.forEach((e,i)=>{
    e.dancing=true; e.dancePhase=0; e.danceType=type;
    e._danceOffset=(i/visible.length)*Math.PI*2;
    e._danceRadius=Math.random()*3;
    if (type==='circle') {
      e.x=camX+canvas.width*0.5;
      e.y=canvas.height*0.5;
    }
  });
  setTimeout(()=>{
    entities.forEach(e=>{ e.dancing=false; e.spinAngle=0; });
    danceActive=false;
  },8000);
}

// ─── PLAYER CONTROL ───────────────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

let joystickActive=false, joystickX=0, joystickY=0;
const joyArea=document.getElementById('joystick-area');
const joyThumb=document.getElementById('joystick-thumb');

function joystickEvent(type, clientX, clientY) {
  const rect=joyArea.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  if (type==='start') { joystickActive=true; }
  if (type==='move' && joystickActive) {
    const dx=clientX-cx, dy=clientY-cy;
    const d=Math.sqrt(dx*dx+dy*dy), maxR=40;
    const r=Math.min(d,maxR);
    joystickX=dx/Math.max(d,1)*r/maxR; joystickY=dy/Math.max(d,1)*r/maxR;
    joyThumb.style.left=(50+joystickX*40)+'%'; joyThumb.style.top=(50+joystickY*40)+'%';
  }
  if (type==='end') { joystickActive=false; joystickX=0; joystickY=0; joyThumb.style.left='50%'; joyThumb.style.top='50%'; }
}
joyArea.addEventListener('touchstart',e=>{e.preventDefault();joystickEvent('start',e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
joyArea.addEventListener('touchmove',e=>{e.preventDefault();joystickEvent('move',e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
joyArea.addEventListener('touchend',e=>{e.preventDefault();joystickEvent('end')},{passive:false});
joyArea.addEventListener('mousedown',e=>joystickEvent('start',e.clientX,e.clientY));
window.addEventListener('mousemove',e=>{if(joystickActive)joystickEvent('move',e.clientX,e.clientY)});
window.addEventListener('mouseup',()=>joystickEvent('end'));

let playerDashCooldown=0, playerSpin=0, playerDashing=false;

function updatePlayer(dt) {
  if (!playerEntity) return;
  const p=playerEntity;
  const spd=p.speed;
  let dx=0, dy=0;

  if (keys['ArrowLeft']||keys['a']) dx-=1;
  if (keys['ArrowRight']||keys['d']) dx+=1;
  if (keys['ArrowUp']||keys['w']) dy-=1;
  if (keys['ArrowDown']||keys['s']) dy+=1;
  dx+=joystickX; dy+=joystickY;

  if (dx<-0.1) p.flipX=false; else if (dx>0.1) p.flipX=true;

  if (playerDashing) { dx*=3.5; dy*=3.5; }

  p.vx += dx*spd*0.3; p.vy += dy*spd*0.3;
  p.vx*=0.88; p.vy*=0.88;
  const maxV=spd*(playerDashing?5:2.5);
  const sv=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
  if(sv>maxV){p.vx=(p.vx/sv)*maxV;p.vy=(p.vy/sv)*maxV;}

  if (playerSpin>0) { playerSpin-=dt; }

  p.x+=p.vx; p.y+=p.vy;
  p.x=((p.x%WORLD_WIDTH)+WORLD_WIDTH)%WORLD_WIDTH;
  const H=canvas.height, m=p.size*2;
  if(p.y<m){p.y=m;p.vy=Math.abs(p.vy);}
  if(p.y>H-m){p.y=H-m;p.vy=-Math.abs(p.vy);}
  playerDashCooldown-=dt;

  // Smooth camera
  camX += (p.x - canvas.width/2 - camX)*0.08;
}

function triggerDash() {
  if (playerDashCooldown>0||!playerEntity) return;
  playerDashing=true; playerDashCooldown=90;
  setTimeout(()=>playerDashing=false,400);
}
function triggerSpinAction() {
  if (!playerEntity) return;
  playerSpin=30;
  playerEntity.spinAngle=(playerEntity.spinAngle||0)+Math.PI*2;
}
document.getElementById('btn-dash').addEventListener('click',triggerDash);
document.getElementById('btn-spin').addEventListener('click',triggerSpinAction);
document.getElementById('btn-up').addEventListener('click',()=>{ if(playerEntity){playerEntity.vy-=playerEntity.speed*2;} });
document.getElementById('btn-down').addEventListener('click',()=>{ if(playerEntity){playerEntity.vy+=playerEntity.speed*2;} });

// ─── SELECTOR UI ──────────────────────────────────────────────────────────────
const grid=document.getElementById('animal-grid');
for (const def of ANIMAL_DEFS) {
  const card=document.createElement('div');
  card.className='animal-card';
  card.innerHTML=`<div class="icon">${def.icon}</div><div class="name">${def.name}</div>`;
  card.addEventListener('click',()=>chooseAnimal(def));
  grid.appendChild(card);
}
document.getElementById('ai-mode-btn').addEventListener('click',()=>{
  isAIMode=true;
  if(playerEntity){playerEntity.isPlayer=false;playerEntity=null;}
  document.getElementById('selector').style.display='none';
  document.getElementById('joystick-area').style.display='none';
  document.getElementById('action-btns').style.display='none';
  pickAICreature();
});
let autoPan=false, autoPanV=1.5;

function pickAICreature() {
  if (entities.length === 0) return;
  aiFollowEntity = entities[Math.floor(Math.random()*entities.length)];
  camX = aiFollowEntity.x - canvas.width/2;
  document.getElementById('hud-animal').textContent = aiFollowEntity.icon + ' ' + aiFollowEntity.name;
  document.getElementById('hud-mode').textContent = 'AI Watch';
}

function chooseAnimal(def) {
  isAIMode=false; autoPan=false; aiFollowEntity=null;
  lastChosenDef=def;
  document.getElementById('selector').style.display='none';
  document.getElementById('joystick-area').style.display='block';
  document.getElementById('action-btns').style.display='grid';
  // Find or create entity
  let found = entities.find(e=>e.name===def.name&&!e.isPlayer);
  if (!found) {
    found=new Entity(def,camX+canvas.width/2,canvas.height/2);
    entities.push(found);
  }
  if (playerEntity) playerEntity.isPlayer=false;
  playerEntity=found; playerEntity.isPlayer=true;
  document.getElementById('hud-animal').textContent=def.name;
  document.getElementById('hud-mode').textContent='Player';
}

document.getElementById('btn-change').addEventListener('click',()=>{
  document.getElementById('selector').style.display='flex';
});
document.getElementById('btn-ai').addEventListener('click',()=>{
  isAIMode=true;
  document.getElementById('joystick-area').style.display='none';
  document.getElementById('action-btns').style.display='none';
  if(playerEntity){
    // Follow the exact animal the user was playing
    aiFollowEntity=playerEntity;
    playerEntity.isPlayer=false; playerEntity=null;
    document.getElementById('hud-animal').textContent=aiFollowEntity.icon+' '+aiFollowEntity.name;
    document.getElementById('hud-mode').textContent='AI Watch';
    camX=aiFollowEntity.x-canvas.width/2;
  } else {
    pickAICreature();
  }
});

let speedMult=1;
document.getElementById('btn-speed').addEventListener('click',()=>{
  speedMult=speedMult===1?2:speedMult===2?0.5:1;
  document.getElementById('btn-speed').textContent=`Speed: ${speedMult===1?'Normal':speedMult===2?'Fast':'Slow'}`;
});

// ─── HUD ─────────────────────────────────────────────────────────────────────
let lastZoneName='';
function updateHUD() {
  const wx=((camX%WORLD_WIDTH)+WORLD_WIDTH)%WORLD_WIDTH;
  const zone=getZone(wx);
  if (zone.name!==lastZoneName) {
    lastZoneName=zone.name;
    const zn=document.getElementById('zone-name');
    document.getElementById('hud-zone').textContent=zone.name;
    zn.textContent=zone.name; zn.style.opacity='1';
    setTimeout(()=>zn.style.opacity='0',3000);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let t=0;
function loop() {
  requestAnimationFrame(loop);
  t++;
  const dt=speedMult;

  // Atmosphere counters
  bgCycleT += 0.5 * dt;
  neonTriggerT -= dt;
  if(neonTriggerT<=0 && !neonMode){ neonMode=true; neonTimer=7200; neonTriggerT=10800+Math.random()*7200; }
  if(neonMode){ neonTimer-=dt; if(neonTimer<=0) neonMode=false; }

  drawBackground(t);

  // Sort by y for depth
  const sorted=[...entities].sort((a,b)=>a.y-b.y);

  for (const e of sorted) {
    if (!e.isPlayer) e.update(t, dt, entities, playerEntity);
  }

  if (isAIMode) {
    if (aiFollowEntity) {
      const targetCamX = aiFollowEntity.x - canvas.width/2;
      camX += (targetCamX - camX) * 0.04 * speedMult;
    }
  } else if (playerEntity) {
    updatePlayer(dt);
  }

  // Draw entities
  for (const e of sorted) {
    e.draw(ctx, t);
  }

  // ── Neon mode: glowing halos around all creatures ─────────────────────────
  if(neonMode){
    for(const e of sorted){
      const sx=e.x-camX;
      if(sx<-e.size*3||sx>canvas.width+e.size*3) continue;
      ctx.save();
      const nh=`hsl(${(e.x*0.02+t*0.1)%360},100%,60%)`;
      ctx.globalAlpha=0.55+Math.sin(t*0.08+e.bobOffset)*0.2;
      ctx.strokeStyle=nh; ctx.lineWidth=3;
      ctx.shadowColor=nh; ctx.shadowBlur=22;
      ctx.beginPath(); ctx.arc(sx,e.y,e.size*1.25,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
  }

  // ── Bubble rings (dolphin vortex rings) ──────────────────────────────────
  for (let i=bubbleRings.length-1; i>=0; i--) {
    const r=bubbleRings[i];
    r.x+=r.vx; r.y+=r.vy;
    r.vx*=0.984; r.vy-=0.055;
    r.r=Math.min(r.r+0.22, r.maxR);
    r.alpha-=0.0022;
    if(r.alpha<=0||r.y<-r.maxR*3){bubbleRings.splice(i,1);continue;}
    const sx=r.x-camX;
    if(sx<-120||sx>canvas.width+120) continue;
    ctx.save();
    ctx.globalAlpha=r.alpha;
    const rc=neonMode?`hsl(${(t*2)%360},100%,65%)`:'rgba(190,238,255,0.95)';
    ctx.shadowColor=neonMode?rc:'#aef'; ctx.shadowBlur=neonMode?22:16;
    ctx.strokeStyle=rc; ctx.lineWidth=Math.max(1.8,r.r*0.27);
    ctx.beginPath(); ctx.ellipse(sx,r.y,r.r,r.r*0.40,0,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0; ctx.globalAlpha=r.alpha*0.22;
    ctx.fillStyle='rgba(220,248,255,0.6)';
    ctx.beginPath(); ctx.ellipse(sx,r.y,r.r*0.58,r.r*0.16,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Dance timer
  if (!danceActive){ danceTimer-=dt; if(danceTimer<=0) triggerDance(); }

  updateHUD();

  // UI auto-hide after 15s of inactivity
  if(document.getElementById('selector').style.display==='none'){
    if(Date.now()-lastActivity>15000) uiEls().forEach(el=>el&&el.classList.add('ui-faded'));
  }

  // Player spin overlay
  if(playerEntity&&playerSpin>0){
    ctx.save();
    const sx=playerEntity.x-camX;
    ctx.globalAlpha=playerSpin/30*0.3; ctx.strokeStyle='#aaf'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(sx,playerEntity.y,playerEntity.size*1.5,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // Bubble trail for player dash
  if(playerDashing&&playerEntity){
    for(let i=0;i<3;i++){
      const bx=playerEntity.x-camX+Math.random()*20-10, by=playerEntity.y+Math.random()*20-10;
      ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle='#aef'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(bx,by,3+Math.random()*5,0,Math.PI*2); ctx.stroke(); ctx.restore();
    }
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
spawnEntities();
camX = WORLD_WIDTH/2 - canvas.width/2;
loop();
</script>
